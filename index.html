<!DOCTYPE html>
<html lang="en-US">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>CSUN Map Quiz</title>
    <link rel="stylesheet" href="//fonts.googleapis.com/css?family=Source+Sans+Pro:400,400i,700,700i,900,900i" type="text/css" media="all">
    <link rel="stylesheet" href="style.css">
</head>

    <body>
        <header class="masthead">
            <h1>Map Quiz. Please double click on the map the location of:</h1>
        </header>
        <main class="main">
            <section class="info">
                <section id="questions">
                </section>
                <br>
                <section id = "results-box">
                    <div id="results">
                    </div>
                    <p id="final-score"></p>
                    <button id="reset-button">Reset</button>
                </section>

            </section>
            <section class="map-stuff">
                <section class="button-section">
                    <select id="maptype">
                        <option value="roadmap">Roadmap</option>
                        <option value="satellite">Satellite</option>
                        <option value="hybrid" disabled>3D</option>
                    </select>
                    <!-- <label id="btn-container"disabled> 
                        <br>Select Satellite Map:
                        <input type="checkbox" id="maptype"></input>
                        <span class="dmstyle"></span>
                    </label> -->
                    <button id="hints-btn">Show Hints</button>
                </section><!-- Button Selection-->
                <div id="map"></div>
                <gmp-map-3d id="map-3d" mode="hybrid" 
                    center="34.2390, -118.5291" 
                    range="800" tilt="45" heading="0">
                </gmp-map-3d>
            </section>
        </main>
        <!-- https://www.youtube.com/watch?v=uPhWSyRqQDA helped -->

        <script src="script.js"></script>
        <!-- <script async src="https://maps.googleapis.com/maps/api/js?key=AIzaSyA1nFtknIuYLLk4rR9Zd6jpg1dGiJtGl54&loading=async&callback=initMap"></script> -->
        <script async src="https://maps.googleapis.com/maps/api/js?key=AIzaSyA1nFtknIuYLLk4rR9Zd6jpg1dGiJtGl54&loading=async&v=beta&libraries=maps3d&callback=initMap"></script>
        <!-- <script defer
            src="https://maps.googleapis.com/maps/api/js?key=AIzaSyA1nFtknIuYLLk4rR9Zd6jpg1dGiJtGl54&callback=initMap">
        </script>
        <script src="script.js" ></script> -->
    </body>

</html>
