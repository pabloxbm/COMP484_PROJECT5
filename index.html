<!DOCTYPE html>
<html lang="en-US">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>CSUN Map Quiz</title>
    <link rel="stylesheet" href="//fonts.googleapis.com/css?family=Source+Sans+Pro:400,400i,700,700i,900,900i" type="text/css" media="all">
    <link rel="stylesheet" href="style.css">
</head>

    <body>
        <header class="masthead">
            <h1>Map Quiz. Please double click on the map the location of:</h1>
        </header>
        <main class="main">
            <section class="info">
                <section id="questions">
                </section>
                <br>
                <section id = "results-box">
                    <div id="results">
                    </div>
                    <p id="final-score"></p>
                </section>

            </section>
            <section class="map-stuff">
                <section class="button-section">
                    
                    <label id="btn-container"disabled> 
                        <br>Select Satellite Map:
                        <input type="checkbox" id="maptype"></input>
                        <span class="dmstyle"></span>
                    </label>
                </section>
                <div id="map"></div>
            </section>
        </main>
        <!-- https://www.youtube.com/watch?v=uPhWSyRqQDA helped -->

        <script src="script.js"></script>
        <script async src="https://maps.googleapis.com/maps/api/js?key=AIzaSyA1nFtknIuYLLk4rR9Zd6jpg1dGiJtGl54&loading=async&callback=initMap"></script>

</html>
